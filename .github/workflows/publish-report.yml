name: Publish report

# Render the Quarto presentation layer (report/) and deploy it to GitHub Pages.
# The report cells read only the COMMITTED validated output tables and rebuild
# figures in-cell via viz — no GEE pull, no geo stack — so the render is light
# (pandas + matplotlib + seaborn + jupyter). Figures (outputs/**/*.png) are
# gitignored and regenerated here at render time (DEC-008).

on:
  push:
    branches: [main]
    paths:
      - "report/**"
      - "outputs/**"
      - "viz/**"
      - "schema/**"
      - ".github/workflows/publish-report.yml"
  workflow_dispatch:

# Least privilege for the OIDC-based Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight Pages deploy at a time; newer pushes supersede.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install render dependencies
        run: pip install -r report/requirements.txt

      - name: Render report
        run: quarto render report

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: report/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
